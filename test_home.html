<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JB Design | Portfolio</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; padding-top: 50px; }
        .modal-content { background: #fff; margin: auto; padding: 30px; width: 80%; max-width: 900px; border-radius: 8px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 20px; font-size: 30px; cursor: pointer; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-grid img { width: 100%; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Our Projects</h2>
        <div id="portfolio-grid" class="grid">로딩 중...</div>
    </div>

    <div id="project-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title"></h2>
            <p><strong>위치:</strong> <span id="modal-location"></span> | <strong>면적:</strong> <span id="modal-area"></span></p>
            <p id="modal-desc"></p>
            <div id="modal-gallery" class="gallery-grid"></div>
        </div>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbw86csvjh83p32eBgHO3nSmrMBeTFbYoVX-AAfCinjE2xOD135YBCmToHSa5sWkC_pf/exec";
        let portfolioList = [];

        window.onload = async function() {
            try {
                const res = await fetch(webAppUrl + "?sheet=Portfolio");
                portfolioList = await res.json();
                renderPortfolio(portfolioList);
            } catch (err) { console.error(err); }
        };

        function renderPortfolio(data) {
            const grid = document.getElementById("portfolio-grid");
            grid.innerHTML = "";
            data.forEach((p, index) => {
                // 시트 헤더 명칭과 정확히 일치시킴
                if (p["Is_Main_Display (메인노출)"] !== "TRUE") return; 
                
                grid.innerHTML += `
                    <div class="card" onclick="openModal(${index})">
                        <img src="${p["Main_Image (대표 이미지)"]}" alt="main">
                        <div class="card-content">
                            <h3>${p["Project_Name (프로젝트명)"]}</h3>
                            <p>${p["Location (위치)"]}</p>
                        </div>
                    </div>`;
            });
        }

        function openModal(index) {
            const p = portfolioList[index];
            document.getElementById("modal-title").innerText = p["Project_Name (프로젝트명)"];
            document.getElementById("modal-location").innerText = p["Location (위치)"];
            document.getElementById("modal-area").innerText = p["Area_Size (면적)"];
            document.getElementById("modal-desc").innerText = p["Full_Desc (상세 설명)"];

            const gallery = document.getElementById("modal-gallery");
            gallery.innerHTML = `<img src="${p["Main_Image (대표 이미지)"]}">`;
            
            // Sub Images 컬럼의 콤마 데이터를 분리
            if (p["Sub Images"]) {
                p["Sub Images"].split(",").forEach(url => {
                    if (url.trim()) gallery.innerHTML += `<img src="${url.trim()}">`;
                });
            }
            document.getElementById("project-modal").style.display = "block";
        }

        function closeModal() { document.getElementById("project-modal").style.display = "none"; }
    </script>
</body>
</html>
