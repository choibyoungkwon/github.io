<!-- list.html -->
<div class="portfolio-section">
    <h2 class="section-title" id="category-title">Projects</h2>
    <div class="grid" id="portfolio-list"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('category');
    document.getElementById('category-title').innerText = category;

    fetch("https://script.google.com/macros/s/AKfycbw86csvjh83p32eBgHO3nSmrMBeTFbYoVX-AAfCinjE2xOD135YBCmToHSa5sWkC_pf/exec?sheet=Portfolio")
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("portfolio-list");
            data.filter(p => p["Category (분류)"] === category).forEach(p => {
                list.innerHTML += `
                    <div class="card" onclick="location.href='detail.html?id=${p["Project_ID"]}'">
                        <img src="${p["Main_Image (대표 이미지)"]}" class="card-img">
                        <div class="card-title">${p["Project_Name (프로젝트명)"]}</div>
                        <div class="card-desc">${p["Location (위치)"]} · ${p["Area_Size (면적)"]} <br> ${p["Short_Desc (요약 설명)"]}</div>
                    </div>`;
            });
        });
</script>
