<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>JB Design | 홈페이지 관리자</title>
	<style>
		body {
			font-family: 'Noto Sans KR', sans-serif;
			background: #f4f4f4;
			padding: 50px;
		}
		.admin-container {
			max-width: 600px;
			background: #fff;
			padding: 40px;
			border-radius: 8px;
			margin: 0 auto;
			box-shadow: 0 4px 10px rgba(0,0,0,0.1);
		}
		h2 {
			margin-top: 0;
			color: #111;
			border-bottom: 2px solid #111;
			padding-bottom: 15px;
		}
		.form-group { margin-bottom: 20px; }
		label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
		select, input[type="text"], textarea, input[type="file"] {
			width: 100%;
			padding: 12px;
			border: 1px solid #ccc;
			border-radius: 4px;
			box-sizing: border-box;
			font-family: inherit;
		}
		textarea { height: 100px; resize: vertical; }
		.btn-submit {
			width: 100%;
			padding: 15px;
			background: #111;
			color: #fff;
			font-size: 16px;
			font-weight: bold;
			border: none;
			cursor: pointer;
			border-radius: 4px;
		}
		.btn-submit:hover:not(:disabled) { background: #333; }
		.btn-submit:disabled { background: #aaa; cursor: not-allowed; }
		.helper { font-size: 12px; color: #666; margin-top: 6px; }
	</style>
</head>
<body>
	<div class="admin-container">
		<h2>홈페이지 자료 업로드</h2>
		<form id="uploadForm">
			<div class="form-group">
				<label>어디에 들어갈 자료인가요? (카테고리 선택)</label>
				<select id="section" required>
					<option value="배경화면">메인 배경사진 및 문구 (Hero)</option>
					<option value="배너">중간 배너 (Stats/Banner)</option>
					<option value="포트폴리오_오피스">포트폴리오 - 오피스</option>
					<option value="포트폴리오_상업공간">포트폴리오 - 상업공간</option>
					<option value="포트폴리오_레지던스">포트폴리오 - 레지던스</option>
				</select>
			</div>
			<div class="form-group">
				<!-- 기존 코드의 form 내부를 아래와 같이 라벨 ID만 추가해 줍니다 -->
		    <!-- id="titleLabel" 추가 -->
  				<label id="titleLabel">제목 (Title)</label>
                <input type="text" id="title" placeholder="예: 공간의 본질에 기능과 가치를 더하다" required />
            </div>
            <div class="form-group">
            <!-- id="descLabel" 추가 -->
                <label id="descLabel">설명 (Description)</label>
                <textarea id="desc" placeholder="세부 설명을 적어주세요."></textarea>
            </div>
				<label>제목 (Title)</label>
				<input type="text" id="title" placeholder="예: 공간의 본질에 기능과 가치를 더하다" required />
			</div>
			<div class="form-group">
				<label>설명 (Description)</label>
				<textarea id="desc" placeholder="세부 설명을 적어주세요."></textarea>
			</div>
			<div class="form-group">
				<label>사진 파일 첨부</label>
				<input type="file" id="file" accept="image/*" required />
				<p class="helper">권장: 5MB 이하 이미지 (jpg, png, webp)</p>
			</div>
			<button type="submit" class="btn-submit" id="submitBtn">구글 드라이브에 업로드 및 홈페이지 반영</button>
		</form>
	</div>

	<script>
		const webAppUrl = "https://script.google.com/macros/s/AKfycbw86csvjh83p32eBgHO3nSmrMBeTFbYoVX-AAfCinjE2xOD135YBCmToHSa5sWkC_pf/exec";
		const form = document.getElementById("uploadForm");
		const btn = document.getElementById("submitBtn");
        const webAppUrl = "https://script.google.com/macros/s/.../exec";
        const sectionSelect = document.getElementById("section");
		const titleLabel = document.getElementById("titleLabel");
		const titleInput = document.getElementById("title");
		const descLabel = document.getElementById("descLabel");
		const descInput = document.getElementById("desc");

// 💡 카테고리 선택 변경 시 입력창 레이블과 플레이스홀더를 동적으로 바꾸는 이벤트 리스너
		sectionSelect.addEventListener("change", function() {
    	const selectedValue = this.value;

    // 선택한 카테고리에 '포트폴리오'라는 단어가 포함되어 있다면
    		if (selectedValue.includes("포트폴리오")) {
        		titleLabel.innerText = "프로젝트명 / 공간 이름 (Project Name)";
        		titleInput.placeholder = "예: Thu Thiem GSA 전시회 인테리어 공사";
        
        		descLabel.innerText = "디자인 콘셉트 및 상세 설명 (Design Concept)";
        		descInput.placeholder = "공간의 디자인 의도, 사용된 주요 마감재, 현장 시공 특징 등을 상세히 적어주세요.";
   				} 
    // 메인 배경화면이나 배너일 경우 기본 텍스트로 복원
   			 else {
        		titleLabel.innerText = "제목 (Title)";
        		titleInput.placeholder = "예: 공간의 본질에 기능과 가치를 더하다";
        
        		descLabel.innerText = "설명 (Description)";
        		descInput.placeholder = "세부 설명을 적어주세요.";
    			}
		});
		function setBtnState(text, disabled) {
			btn.innerText = text;
			btn.disabled = disabled;
		}

		function fileToBase64(file) {
			return new Promise((resolve, reject) => {
				const reader = new FileReader();
				reader.onload = (e) => resolve(e.target.result.split(",")[1]);
				reader.onerror = reject;
				reader.readAsDataURL(file);
			});
		}

		form.addEventListener("submit", async (e) => {
			e.preventDefault();

			if (!form.checkValidity()) {
				alert("모든 항목을 입력하고 사진을 첨부해 주세요.");
				return;
			}

			const file = document.getElementById("file").files[0];
			if (!file) {
				alert("사진 파일을 첨부해 주세요.");
				return;
			}
			if (file.size > 5 * 1024 * 1024) {
				alert("파일 용량이 너무 큽니다. 5MB 이하 파일을 업로드해 주세요.");
				return;
			}

			setBtnState("업로드 중... (창을 닫지 마세요)", true);

			try {
				const base64Data = await fileToBase64(file);
				const formData = new FormData();
				formData.append("section", document.getElementById("section").value);
				formData.append("title", document.getElementById("title").value.trim());
				formData.append("desc", document.getElementById("desc").value.trim());
				formData.append("fileData", base64Data);
				formData.append("fileName", file.name);
				formData.append("mimeType", file.type);

				const response = await fetch(webAppUrl, { method: "POST", body: formData });

				if (!response.ok) {
					const raw = await response.text();
					throw new Error(`HTTP ${response.status}: ${raw}`);
				}

				const raw = await response.text();
				let result;
				try {
					result = raw ? JSON.parse(raw) : {};
				} catch {
					result = { success: true };
				}

				if (result.success === false) {
					throw new Error(result.message || "서버 처리 실패");
				}

				alert("업로드 완료! 홈페이지 관리 DB 시트와 구글 드라이브 폴더를 확인해 보세요.");
				form.reset();
			} catch (err) {
				console.error("업로드 오류:", err);
				alert("오류가 발생했습니다. 네트워크/GAS 권한/배포 상태를 확인해 주세요.");
			} finally {
				setBtnState("구글 드라이브에 업로드 및 홈페이지 반영", false);
			}
		});
	</script>
</body>
</html>
