<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JB Design | 홈페이지 관리자</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f4f4f4; padding: 50px; }
        .admin-container { max-width: 600px; background: #fff; padding: 40px; border-radius: 8px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #111; border-bottom: 2px solid #111; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        select, input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 100px; resize: vertical; }
        .btn-submit { width: 100%; padding: 15px; background: #111; color: #fff; font-size: 16px; font-weight: bold; border: none; cursor: pointer; border-radius: 4px; }
        .btn-submit:hover { background: #333; }
        /* 언어 선택 버튼 */
        .language-selector { display: flex; gap: 6px; align-items: center; justify-content: flex-end; max-width: 600px; margin: 0 auto 16px; }
        .language-btn { padding: 5px 10px; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.3s ease; color: #111; }
        .language-btn:hover { border-color: #111; background: #f5f5f5; }
        .language-btn.active { background: #111; color: #fff; border-color: #111; }
    </style>
</head>
<body>
    <!-- 언어 선택 버튼 -->
    <div class="language-selector notranslate" translate="no">
        <button class="language-btn active" data-lang="ko" translate="no">한글</button>
        <button class="language-btn" data-lang="en" translate="no">English</button>
        <button class="language-btn" data-lang="vi" translate="no">Tiếng Việt</button>
        <button class="language-btn" data-lang="ja" translate="no">日本語</button>
        <button class="language-btn" data-lang="zh-CN" translate="no">中文</button>
    </div>

    <div class="admin-container">
        <h2>홈페이지 자료 업로드</h2>
        <form id="uploadForm">
            <div class="form-group">
                <label>어디에 들어갈 자료인가요? (카테고리 선택)</label>
                <select id="section">
                    <option value="배경화면">메인 배경사진 및 문구 (Hero)</option>
                    <option value="배너">중간 배너 (Stats/Banner)</option>
                    <option value="포트폴리오_오피스">포트폴리오 - 오피스</option>
                    <option value="포트폴리오_상업공간">포트폴리오 - 상업공간</option>
                    <option value="포트폴리오_레지던스">포트폴리오 - 레지던스</option>
                </select>
            </div>
            <div class="form-group">
                <label>제목 (Title)</label>
                <input type="text" id="title" placeholder="예: 공간의 본질에 기능과 가치를 더하다" required>
            </div>
            <div class="form-group">
                <label>설명 (Description)</label>
                <textarea id="desc" placeholder="세부 설명을 적어주세요."></textarea>
            </div>
            <div class="form-group">
                <label>사진 파일 첨부</label>
                <input type="file" id="file" accept="image/*" required>
            </div>
            <button type="button" class="btn-submit" onclick="uploadData()">구글 드라이브에 업로드 및 홈페이지 반영</button>
        </form>
    </div>

    <script>
        function uploadData() {
            const form = document.getElementById('uploadForm');
            if(!form.checkValidity()) { alert("모든 항목을 입력하고 사진을 첨부해 주세요."); return; }

            const btn = document.querySelector('.btn-submit');
            btn.innerText = "업로드 중... (창을 닫지 마세요)";
            btn.disabled = true;

            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                const formData = new FormData();
                
                formData.append('section', document.getElementById('section').value);
                formData.append('title', document.getElementById('title').value);
                formData.append('desc', document.getElementById('desc').value);
                formData.append('fileData', base64Data);
                formData.append('fileName', file.name);
                formData.append('mimeType', file.type);

                // ⚠️ 여기에 배포하신 웹앱 URL을 입력해 주세요!
                const webAppUrl = "https://script.google.com/macros/s/AKfycbwxuTGvuW8tCQ1c3pIa5ZwC__SXEuIth_i0kqyloenTvBA3QSSU3564WlmZDd0JsUOi/exec";

                fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: formData })
                .then(() => {
                    alert("업로드 완료! 홈페이지 관리 DB 시트와 구글 드라이브 폴더를 확인해 보세요.");
                    form.reset();
                    btn.innerText = "구글 드라이브에 업로드 및 홈페이지 반영";
                    btn.disabled = false;
                }).catch(err => {
                    alert("오류가 발생했습니다.");
                    btn.disabled = false;
                });
            };
            reader.readAsDataURL(file);
        }
    </script>

    <!-- 숨겨진 Google Translate 요소 -->
    <div id="google_translate_element" style="position:absolute;top:-9999px;left:-9999px;visibility:hidden;"></div>

    <!-- 공유 번역 스크립트 로드 -->
    <script src="js/translate-setup.js"></script>
</body>
</html>
