<div class="portfolio-section" style="max-width: 1000px; margin: auto;">
    <h1 id="d-title"></h1>
    <div id="main-view" style="width:100%; height:500px; background-size:cover; background-position:center; margin-bottom:20px;"></div>
    <div id="sub-gallery" style="display:flex; gap:10px; overflow-x:auto;"></div>
</div>

<script>
    const id = new URLSearchParams(window.location.search).get('id');
    fetch("https://script.google.com/macros/s/AKfycbw86csvjh83p32eBgHO3nSmrMBeTFbYoVX-AAfCinjE2xOD135YBCmToHSa5sWkC_pf/exec?sheet=Portfolio")
        .then(res => res.json())
        .then(data => {
            const p = data.find(item => item["Project_ID"] === id);
            document.getElementById("d-title").innerText = p["Project_Name (프로젝트명)"];
            document.getElementById("main-view").style.backgroundImage = `url('${p["Main_Image (대표 이미지)"]}')`;
            
            // 모든 이미지 슬라이드 처리
            const imgs = [p["Main_Image (대표 이미지)"], ...p["Sub Images"].split(",")];
            imgs.forEach(url => {
                if(url.trim()) document.getElementById("sub-gallery").innerHTML += 
                    `<img src="${url.trim()}" style="width:150px; height:150px; cursor:pointer;" onclick="document.getElementById('main-view').style.backgroundImage='url(\''+this.src+'\')'">`;
            });
        });
</script>
