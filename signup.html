<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JB Design | 회원가입</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: 'Helvetica Neue', 'Noto Sans KR', sans-serif;
				color: #111;
				background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
				min-height: 100vh;
				display: flex;
				flex-direction: column;
			}

			a {
				text-decoration: none;
				color: inherit;
			}

			/* 헤더 */
			.header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 20px 50px;
				background: #fff;
				border-bottom: 1px solid #eaeaea;
			}

			.logo {
				display: flex;
				align-items: center;
				font-size: 24px;
				font-weight: 900;
				letter-spacing: 1.5px;
				cursor: pointer;
				transition: color 0.3s;
			}

			.logo:hover {
				color: #666;
			}

			.logo-img {
				height: 35px;
				margin-right: 12px;
				object-fit: contain;
			}

			/* 언어 선택 버튼 */
			.language-selector {
				display: flex;
				gap: 8px;
				align-items: center;
				margin-left: 20px;
				flex-wrap: wrap;
				justify-content: flex-end;
			}

			.language-btn {
				padding: 6px 12px;
				border: 1px solid #ddd;
				background: #fff;
				border-radius: 4px;
				cursor: pointer;
				font-size: 12px;
				font-weight: 600;
				transition: all 0.3s ease;
				color: #111;
			}

			.language-btn:hover {
				border-color: #111;
				background: #f5f5f5;
			}

			.language-btn.active {
				background: #111;
				color: #fff;
				border-color: #111;
			}

			/* 메인 컨테이너 */
			.container {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 40px 20px;
			}

			.form-box {
				background: #fff;
				padding: 50px 40px;
				border-radius: 12px;
				box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
				width: 100%;
				max-width: 420px;
			}

			.form-box h2 {
				font-size: 28px;
				margin-bottom: 30px;
				text-align: center;
				color: #111;
			}

			.form-group {
				margin-bottom: 20px;
			}

			.form-group label {
				display: block;
				font-size: 13px;
				font-weight: 700;
				margin-bottom: 8px;
				color: #333;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}

			.input-wrapper {
				position: relative;
				display: flex;
				align-items: center;
			}

			.form-group input,
			.form-group select {
				width: 100%;
				padding: 12px 14px;
				border: 1.5px solid #ddd;
				border-radius: 6px;
				font-size: 15px;
				transition: all 0.3s;
				font-family: inherit;
			}

			.form-group input:focus,
			.form-group select:focus {
				outline: none;
				border-color: #111;
				box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
			}

			/* 상태 표시기 */
			.status-indicator {
				position: absolute;
				right: 14px;
				font-size: 18px;
				pointer-events: none;
				transition: all 0.2s;
			}

			.status-indicator.valid {
				color: #4CAF50;
			}

			.status-indicator.invalid {
				color: #f44336;
			}

			.status-indicator.checking {
				color: #FFC107;
				animation: pulse 1s infinite;
			}

			@keyframes pulse {
				0%, 100% {
					opacity: 0.6;
				}
				50% {
					opacity: 1;
				}
			}

			/* 검증 메시지 */
			.validation-msg {
				font-size: 12px;
				margin-top: 6px;
				display: none;
				transition: all 0.2s;
			}

			.validation-msg.show {
				display: block;
			}

			.validation-msg.error {
				color: #f44336;
			}

			.validation-msg.success {
				color: #4CAF50;
			}

			.validation-msg.warning {
				color: #FFC107;
			}

			/* 비밀번호 요구사항 */
			.password-requirements {
				background: #f9f9f9;
				padding: 15px;
				border-radius: 6px;
				margin-top: 10px;
				display: none;
			}

			.password-requirements.show {
				display: block;
			}

			.requirement-item {
				display: flex;
				align-items: center;
				font-size: 13px;
				margin: 8px 0;
				color: #999;
				transition: color 0.2s;
			}

			.requirement-item.met {
				color: #4CAF50;
			}

			.requirement-item::before {
				content: '○';
				margin-right: 10px;
				font-weight: bold;
				font-size: 14px;
			}

			.requirement-item.met::before {
				content: '✓';
			}

			.submit-btn {
				width: 100%;
				padding: 14px;
				background: #111;
				color: #fff;
				font-weight: 700;
				border: none;
				border-radius: 6px;
				cursor: pointer;
				font-size: 15px;
				transition: all 0.3s;
				margin-top: 10px;
			}

			.submit-btn:hover:not(:disabled) {
				background: #333;
			}

			.submit-btn:disabled {
				background: #ccc;
				cursor: not-allowed;
				opacity: 0.6;
			}

			.footer-link {
				text-align: center;
				margin-top: 20px;
				font-size: 13px;
				color: #666;
			}

			.footer-link a {
				color: #111;
				font-weight: 700;
				transition: color 0.3s;
			}

			.footer-link a:hover {
				color: #666;
			}

			.divider {
				text-align: center;
				margin: 25px 0;
				color: #999;
				font-size: 13px;
			}

			.login-btn {
				width: 100%;
				padding: 14px;
				background: #666;
				color: #fff;
				font-weight: 700;
				border: none;
				border-radius: 6px;
				cursor: pointer;
				font-size: 15px;
				transition: all 0.3s;
			}

			.login-btn:hover {
				background: #333;
			}

			.back-home {
				display: inline-block;
				font-size: 13px;
				color: #666;
				margin-top: 20px;
				transition: color 0.3s;
			}

			.back-home:hover {
				color: #111;
			}

			/* 모바일 대응 */
			@media (max-width: 768px) {
				.header {
					padding: 15px 20px;
					flex-direction: column;
					align-items: flex-start;
					gap: 12px;
				}

				.language-selector {
					margin-left: 0;
					width: 100%;
					justify-content: flex-start;
				}

				.language-btn {
					font-size: 11px;
					padding: 6px 10px;
				}

				.form-box {
					padding: 30px 20px;
				}

				.container {
					padding: 20px;
				}
			}
		</style>
	</head>
	<body>
		<!-- 헤더 -->
		<div class="header">
			<a href="index.html" class="logo">
				<img
					src="https://drive.google.com/thumbnail?id=1-qDwfz9rv8F7Hdq9pANFwhZNbfRLVvPR&sz=w1000"
					class="logo-img"
				/>
				JB DESIGN
			</a>
			<div class="language-selector">
				<button class="language-btn active" data-lang="ko" aria-pressed="true">한글</button>
				<button class="language-btn" data-lang="en" aria-pressed="false">English</button>
				<button class="language-btn" data-lang="vi" aria-pressed="false">Tiếng Việt</button>
				<button class="language-btn" data-lang="ja" aria-pressed="false">日本語</button>
				<button class="language-btn" data-lang="zh-CN" aria-pressed="false">中文</button>
			</div>
		</div>

		<!-- 메인 컨테이너 -->
		<div class="container">
			<div class="form-box">
				<h2>회원가입</h2>

				<form id="signupForm">
					<!-- 아이디 -->
					<div class="form-group">
						<label>아이디</label>
						<div class="input-wrapper">
							<input
								type="text"
								id="signup-id"
								placeholder="소문자 3자 이상"
								required
							/>
							<span class="status-indicator" id="id-status"></span>
						</div>
						<div class="validation-msg" id="id-msg"></div>
					</div>

					<!-- 비밀번호 -->
					<div class="form-group">
						<label>비밀번호</label>
						<div class="input-wrapper">
							<input
								type="password"
								id="signup-pw"
								placeholder="6자 이상, 숫자·특수문자 포함"
								required
							/>
							<span class="status-indicator" id="pw-status"></span>
						</div>
						<div class="password-requirements" id="pw-requirements">
							<div class="requirement-item" id="req-length">6자 이상</div>
							<div class="requirement-item" id="req-number">숫자 포함</div>
							<div class="requirement-item" id="req-special">특수문자 포함</div>
							<div class="requirement-item" id="req-case">대소문자 혼합 (선택)</div>
						</div>
						<div class="validation-msg" id="pw-msg"></div>
					</div>

					<!-- 비밀번호 확인 -->
					<div class="form-group">
						<label>비밀번호 확인</label>
						<div class="input-wrapper">
							<input
								type="password"
								id="signup-pw-confirm"
								placeholder="비밀번호 다시 입력"
								required
							/>
							<span class="status-indicator" id="pw-confirm-status"></span>
						</div>
						<div class="validation-msg" id="pw-confirm-msg"></div>
					</div>

					<!-- 이름 -->
					<div class="form-group">
						<label>이름</label>
						<input
							type="text"
							id="signup-name"
							placeholder="실명 입력"
							required
						/>
					</div>

					<!-- 가입 유형 -->
					<div class="form-group">
						<label>가입 유형</label>
						<select id="signup-role">
							<option value="고객">고객</option>
							<option value="협력업체">협력업체</option>
							<option value="직원">직원</option>
						</select>
					</div>

					<button type="submit" class="submit-btn" id="signupSubmitBtn">
						회원가입
					</button>
				</form>

				<div class="divider">또는</div>

				<a href="login.html" class="login-btn">로그인 하기</a>

				<a href="index.html" class="back-home">← 홈으로</a>
			</div>
		</div>

		<script>
			const GAS_WEB_APP_URL =
				"https://script.google.com/macros/s/AKfycbxqi2XF2lUVThGI1UFbh7nnf0NPNaCbLRfOgS3GkKLggU_wnau4AI32NoBU5DWn57GtWg/exec";

			// ===== 아이디 검증 =====
			const idInput = document.getElementById("signup-id");
			const idStatus = document.getElementById("id-status");
			const idMsg = document.getElementById("id-msg");
			let idCheckTimeout;

			idInput.addEventListener("input", function () {
				const id = this.value.toLowerCase().trim();

				idStatus.textContent = "";
				idMsg.classList.remove("show", "error", "success", "warning");

				clearTimeout(idCheckTimeout);

				if (id.length < 3) {
					if (id.length > 0) {
						idMsg.textContent = "아이디는 3자 이상이어야 합니다.";
						idMsg.classList.add("show", "error");
					}
					return;
				}

				if (!/^[a-z0-9]+$/.test(id)) {
					idMsg.textContent = "아이디는 소문자와 숫자만 사용 가능합니다.";
					idMsg.classList.add("show", "error");
					idStatus.textContent = "✕";
					idStatus.className = "status-indicator invalid";
					return;
				}

				// 중복 검사
				idStatus.textContent = "⟳";
				idStatus.className = "status-indicator checking";
				idMsg.classList.remove("show");

				idCheckTimeout = setTimeout(async () => {
					try {
						const response = await fetch(GAS_WEB_APP_URL, {
							method: "POST",
							body: JSON.stringify({
								action: "checkIdDuplicate",
								id: id,
							}),
						});
						const result = await response.json();

						if (result.available) {
							idStatus.textContent = "✓";
							idStatus.className = "status-indicator valid";
							idMsg.textContent = "사용 가능한 아이디입니다.";
							idMsg.classList.add("show", "success");
						} else {
							idStatus.textContent = "✕";
							idStatus.className = "status-indicator invalid";
							idMsg.textContent = "이미 사용 중인 아이디입니다.";
							idMsg.classList.add("show", "error");
						}
					} catch (error) {
						console.error("아이디 중복 검사 오류:", error);
						idStatus.textContent = "!";
						idStatus.className = "status-indicator invalid";
					}
				}, 500);
			});

			// ===== 비밀번호 검증 =====
			const pwInput = document.getElementById("signup-pw");
			const pwStatus = document.getElementById("pw-status");
			const pwMsg = document.getElementById("pw-msg");
			const pwRequirements = document.getElementById("pw-requirements");
			const reqLength = document.getElementById("req-length");
			const reqNumber = document.getElementById("req-number");
			const reqSpecial = document.getElementById("req-special");
			const reqCase = document.getElementById("req-case");

			pwInput.addEventListener("input", function () {
				const pw = this.value;

				pwRequirements.classList.add("show");
				pwStatus.textContent = "";

				const hasLength = pw.length >= 6;
				const hasNumber = /[0-9]/.test(pw);
				const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw);
				const hasCase = /[a-z]/.test(pw) && /[A-Z]/.test(pw);

				updateRequirement(reqLength, hasLength);
				updateRequirement(reqNumber, hasNumber);
				updateRequirement(reqSpecial, hasSpecial);
				updateRequirement(reqCase, hasCase);

				const isValid = hasLength && hasNumber && hasSpecial;

				if (pw.length === 0) {
					pwStatus.textContent = "";
					pwRequirements.classList.remove("show");
					pwMsg.classList.remove("show");
				} else if (isValid) {
					pwStatus.textContent = "✓";
					pwStatus.className = "status-indicator valid";
					pwMsg.textContent = "안전한 비밀번호입니다.";
					pwMsg.classList.add("show", "success");
				} else {
					pwStatus.textContent = "✕";
					pwStatus.className = "status-indicator invalid";
					pwMsg.textContent = "요구사항을 만족하지 않습니다.";
					pwMsg.classList.add("show", "error");
				}

				validatePasswordConfirm();
			});

			// ===== 비밀번호 확인 검증 =====
			const pwConfirmInput = document.getElementById("signup-pw-confirm");
			const pwConfirmStatus = document.getElementById("pw-confirm-status");
			const pwConfirmMsg = document.getElementById("pw-confirm-msg");

			function validatePasswordConfirm() {
				const pw = pwInput.value;
				const pwConfirm = pwConfirmInput.value;

				pwConfirmStatus.textContent = "";
				pwConfirmMsg.classList.remove("show");

				if (pwConfirm.length === 0) return;

				if (pw === pwConfirm) {
					pwConfirmStatus.textContent = "✓";
					pwConfirmStatus.className = "status-indicator valid";
					pwConfirmMsg.textContent = "비밀번호가 일치합니다.";
					pwConfirmMsg.classList.add("show", "success");
				} else {
					pwConfirmStatus.textContent = "✕";
					pwConfirmStatus.className = "status-indicator invalid";
					pwConfirmMsg.textContent = "비밀번호가 일치하지 않습니다.";
					pwConfirmMsg.classList.add("show", "error");
				}
			}

			pwConfirmInput.addEventListener("input", validatePasswordConfirm);

			function updateRequirement(element, met) {
				if (met) {
					element.classList.add("met");
				} else {
					element.classList.remove("met");
				}
			}

			// ===== 회원가입 폼 제출 =====
			document
				.getElementById("signupForm")
				.addEventListener("submit", async function (e) {
					e.preventDefault();
					const btn = document.getElementById("signupSubmitBtn");

					const id = document.getElementById("signup-id").value.toLowerCase().trim();
					const pw = document.getElementById("signup-pw").value;
					const pwConfirm = document.getElementById("signup-pw-confirm").value;
					const name = document.getElementById("signup-name").value;
					const role = document.getElementById("signup-role").value;

					if (pw !== pwConfirm) {
						alert("비밀번호가 일치하지 않습니다.");
						return;
					}

					btn.innerText = "가입 처리 중...";
					btn.disabled = true;

					const payload = {
						action: "signup",
						id: id,
						pw: pw,
						name: name,
						role: role,
					};

					try {
						const response = await fetch(GAS_WEB_APP_URL, {
							method: "POST",
							body: JSON.stringify(payload),
						});
						const result = await response.json();

						if (result.success) {
							if (result.status === "승인") {
								alert(
									"고객 회원가입이 완료되었습니다. 즉시 로그인이 가능합니다."
								);
							} else {
								alert(
									"가입 신청이 완료되었습니다. 관리자 승인 후 로그인이 가능합니다."
								);
							}
							window.location.href = "login.html";
						} else {
							alert(
								"회원가입에 실패했습니다. 다시 시도해주세요."
							);
							btn.innerText = "회원가입";
							btn.disabled = false;
						}
					} catch (error) {
						alert("서버 통신 오류가 발생했습니다.");
						console.error(error);
						btn.innerText = "회원가입";
						btn.disabled = false;
					}
				});
		</script>
		<div id="google_translate_element" aria-hidden="true"></div>
		<script src="js/translate-setup.js"></script>
	</body>
</html>
